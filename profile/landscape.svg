<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    @keyframes shoot {
      0% { transform: translateX(0) translateY(0); opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 1; }
      100% { transform: translateX(180px) translateY(90px); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes aurora {
      0%, 100% { transform: translateX(0) scaleY(1); opacity: 0.25; }
      50% { transform: translateX(30px) scaleY(1.3); opacity: 0.45; }
    }
    @keyframes aurora2 {
      0%, 100% { transform: translateX(0) scaleY(1); opacity: 0.2; }
      50% { transform: translateX(-25px) scaleY(1.4); opacity: 0.4; }
    }
    @keyframes cloud {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }
    
    .star { animation: twinkle 2s ease-in-out infinite; }
    .star:nth-child(1) { animation-delay: 0s; }
    .star:nth-child(2) { animation-delay: 0.2s; }
    .star:nth-child(3) { animation-delay: 0.4s; }
    .star:nth-child(4) { animation-delay: 0.6s; }
    .star:nth-child(5) { animation-delay: 0.8s; }
    .star:nth-child(6) { animation-delay: 1s; }
    .star:nth-child(7) { animation-delay: 1.2s; }
    .star:nth-child(8) { animation-delay: 1.4s; }
    .star:nth-child(9) { animation-delay: 0.3s; }
    .star:nth-child(10) { animation-delay: 0.7s; }
    
    .shooting { animation: shoot 10s ease-in-out infinite; }
    
    .mountain-far { animation: float 8s ease-in-out infinite; }
    .mountain-mid { animation: float 6s ease-in-out infinite 1s; }
    .mountain-near { animation: float 5s ease-in-out infinite 2s; }
    
    .aurora { animation: aurora 10s ease-in-out infinite; }
    .aurora2 { animation: aurora2 12s ease-in-out infinite 2s; }
    
    .cloud { animation: cloud 20s ease-in-out infinite alternate; }
  </style>
  
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="30%" stop-color="#15152a"/>
      <stop offset="60%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#251535"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff8e7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#00ffcc" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00ccff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8866ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>
  
  <!-- Stars -->
  <g fill="#fff8e7">
    <rect class="star" x="15" y="12" width="2" height="2"/>
    <rect class="star" x="45" y="28" width="3" height="3"/>
    <rect class="star" x="85" y="8" width="2" height="2"/>
    <rect class="star" x="115" y="22" width="2" height="2"/>
    <rect class="star" x="155" y="5" width="3" height="3"/>
    <rect class="star" x="195" y="18" width="2" height="2"/>
    <rect class="star" x="235" y="10" width="2" height="2"/>
    <rect class="star" x="275" y="25" width="3" height="3"/>
    <rect class="star" x="315" y="3" width="2" height="2"/>
    <rect class="star" x="355" y="15" width="2" height="2"/>
    <rect class="star" x="380" y="32" width="3" height="3"/>
    <rect class="star" x="30" y="42" width="2" height="2"/>
    <rect class="star" x="70" y="48" width="2" height="2"/>
    <rect class="star" x="140" y="38" width="3" height="3"/>
    <rect class="star" x="215" y="32" width="2" height="2"/>
    <rect class="star" x="295" y="42" width="2" height="2"/>
    <rect class="star" x="345" y="28" width="2" height="2"/>
    <rect class="star" x="8" y="58" width="2" height="2"/>
    <rect class="star" x="125" y="52" width="2" height="2"/>
    <rect class="star" x="255" y="48" width="3" height="3"/>
    <rect class="star" x="335" y="52" width="2" height="2"/>
    <rect class="star" x="388" y="42" width="2" height="2"/>
    <rect class="star" x="60" y="35" width="2" height="2"/>
    <rect class="star" x="180" y="45" width="2" height="2"/>
    <rect class="star" x="260" y="38" width="2" height="2"/>
    <rect class="star" x="370" y="50" width="2" height="2"/>
  </g>
  
  <!-- Moon glow -->
  <circle cx="340" cy="45" r="30" fill="url(#moonGlow)"/>
  <!-- Moon -->
  <circle cx="340" cy="45" r="18" fill="#fff8e7"/>
  <circle cx="334" cy="40" r="4" fill="#e8e0d0"/>
  <circle cx="344" cy="48" r="3" fill="#e8e0d0"/>
  <circle cx="337" cy="52" r="2" fill="#e8e0d0"/>
  
  <!-- Aurora 1 -->
  <g class="aurora">
    <ellipse cx="180" cy="70" rx="200" ry="40" fill="url(#auroraGrad)"/>
  </g>
  
  <!-- Aurora 2 -->
  <g class="aurora2">
    <ellipse cx="220" cy="85" rx="180" ry="35" fill="url(#auroraGrad)"/>
  </g>
  
  <!-- Clouds -->
  <g class="cloud" fill="#3a2a5a" opacity="0.6">
    <ellipse cx="50" cy="55" rx="40" ry="12"/>
    <ellipse cx="80" cy="52" rx="30" ry="10"/>
    <ellipse cx="30" cy="58" rx="25" ry="8"/>
  </g>
  <g class="cloud" fill="#2a1a4a" opacity="0.5" style="animation-delay: 5s;">
    <ellipse cx="320" cy="60" rx="45" ry="14"/>
    <ellipse cx="355" cy="57" rx="35" ry="11"/>
    <ellipse cx="290" cy="62" rx="28" ry="9"/>
  </g>
  
  <!-- Far mountains -->
  <g class="mountain-far" fill="#2a1a4a">
    <polygon points="0,200 40,120 80,200"/>
    <polygon points="50,200 110,100 170,200"/>
    <polygon points="140,200 200,90 260,200"/>
    <polygon points="230,200 300,105 370,200"/>
    <polygon points="330,200 380,115 400,200"/>
  </g>
  
  <!-- Mid mountains -->
  <g class="mountain-mid" fill="#1f0f2f">
    <polygon points="0,200 60,140 120,200"/>
    <polygon points="80,200 160,115 240,200"/>
    <polygon points="180,200 270,125 360,200"/>
    <polygon points="280,200 350,140 400,200"/>
  </g>
  
  <!-- Near mountains -->
  <g class="mountain-near" fill="#15082a">
    <polygon points="0,200 40,160 80,200"/>
    <polygon points="50,200 120,145 190,200"/>
    <polygon points="150,200 240,135 330,200"/>
    <polygon points="260,200 340,150 400,200"/>
  </g>
  
  <!-- Trees silhouette -->
  <g fill="#0a0515">
    <polygon points="10,200 15,170 20,200"/>
    <polygon points="18,200 25,165 32,200"/>
    <polygon points="28,200 33,175 38,200"/>
    <polygon points="360,200 367,168 374,200"/>
    <polygon points="372,200 380,160 388,200"/>
    <polygon points="385,200 390,172 395,200"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="190" width="400" height="10" fill="#0a0515"/>
  
  <!-- Shooting stars -->
  <g class="shooting" style="animation-delay: 1s;">
    <rect x="80" y="35" width="25" height="2" fill="#fff8e7" transform="rotate(-28, 80, 35)"/>
  </g>
  <g class="shooting" style="animation-delay: 5s;">
    <rect x="150" y="25" width="20" height="2" fill="#c9a227" transform="rotate(-32, 150, 25)"/>
  </g>
  <g class="shooting" style="animation-delay: 8s;">
    <rect x="50" y="45" width="18" height="2" fill="#fff8e7" transform="rotate(-25, 50, 45)"/>
  </g>
</svg>
