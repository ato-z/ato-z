<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    @keyframes shoot {
      0% { transform: translate(0,0); opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 1; }
      100% { transform: translate(120px, 60px); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes aurora {
      0%, 100% { transform: translateX(0px); opacity: 0.3; }
      50% { transform: translateX(10px); opacity: 0.6; }
    }
    
    .star { animation: twinkle 1.5s ease-in-out infinite; fill: #fff8e7; }
    .s { animation-delay: 0s; }
    .s2 { animation-delay: 0.2s; }
    .s3 { animation-delay: 0.4s; }
    .s4 { animation-delay: 0.6s; }
    .s5 { animation-delay: 0.8s; }
    .s6 { animation-delay: 1s; }
    .s7 { animation-delay: 0.3s; }
    .s8 { animation-delay: 0.7s; }
    
    .shooting { animation: shoot 12s ease-in-out infinite; }
    
    .mt-far { animation: float 7s ease-in-out infinite; }
    .mt-mid { animation: float 5s ease-in-out infinite 0.5s; }
    .mt-near { animation: float 4s ease-in-out infinite 1s; }
    
    .aurora { animation: aurora 8s ease-in-out infinite; }
    .glow { animation: glow 3s ease-in-out infinite; }
  </style>
  
  <!-- Sky (pixel blocks) -->
  <rect width="320" height="160" fill="#0a0a1a"/>
  
  <!-- Pixel stars -->
  <g>
