<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <style>
    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }
    @keyframes sway-alt {
      0%, 100% { transform: rotate(1deg); }
      50% { transform: rotate(-1deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-2px); }
    }
    
    .tree-l { transform-origin: bottom center; animation: sway 4s ease-in-out infinite; }
    .tree-r { transform-origin: bottom center; animation: sway-alt 4.5s ease-in-out infinite; }
    .tree-s { transform-origin: bottom center; animation: sway 3.5s ease-in-out infinite 0.5s; }
    .firefly { animation: twinkle 2s ease-in-out infinite; }
    .ff1 { animation-delay: 0s; }
    .ff2 { animation-delay: 0.4s; }
    .ff3 { animation-delay: 0.8s; }
    .ff4 { animation-delay: 1.2s; }
    .ff5 { animation-delay: 1.6s; }
    .leaf { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Sky gradient (dusk forest) -->
  <rect width="320" height="160" fill="#1a2f1a"/>
  
  <!-- Distant trees / forest silhouette -->
  <g fill="#0d1f0d">
    <rect x="0" y="60" width="8" height="100"/>
    <rect x="8" y="50" width="8" height="110"/>
    <rect x="16" y="40" width="8" height="120"/>
    <rect x="24" y="55" width="8" height="105"/>
    
    <rect x="50" y="45" width="8" height="115"/>
    <rect x="58" y="35" width="8" height="125"/>
    <rect x="66" y="50" width="8" height="110"/>
    <rect x="74" y="60" width="8" height="100"/>
    
    <rect x="100" y="40" width="8" height="120"/>
    <rect x="108" y="30" width="8" height="130"/>
    <rect x="116" y="45" width="8" height="115"/>
    <rect x="124" y="55" width="8" height="105"/>
    
    <rect x="150" y="50" width="8" height="110"/>
    <rect x="158" y="38" width="8" height="122"/>
    <rect x="166" y="48" width="8" height="112"/>
    <rect x="174" y="58" width="8" height="102"/>
    
    <rect x="200" y="42" width="8" height="118"/>
    <rect x="208" y="32" width="8" height="128"/>
    <rect x="216" y="50" width="8" height="110"/>
    <rect x="224" y="60" width="8" height="100"/>
    
    <rect x="250" y="48" width="8" height="112"/>
    <rect x="258" y="35" width="8" height="125"/>
    <rect x="266" y="52" width="8" height="108"/>
    <rect x="274" y="62" width="8" height="98"/>
    
    <rect x="295" y="45" width="8" height="115"/>
    <rect x="303" y="38" width="8" height="122"/>
    <rect x="311" y="52" width="8" height="108"/>
  </g>
  
  <!-- Mid trees (layer 2) -->
  <g fill="#153015">
    <rect x="20" y="80" width="8" height="80"/>
    <rect x="28" y="70" width="8" height="90"/>
    <rect x="36" y="85" width="8" height="75"/>
    
    <rect x="80" y="75" width="8" height="85"/>
    <rect x="88" y="65" width="8" height="95"/>
    <rect x="96" y="80" width="8" height="80"/>
    
    <rect x="140" y="78" width="8" height="82"/>
    <rect x="148" y="68" width="8" height="92"/>
    <rect x="156" y="82" width="8" height="78"/>
    
    <rect x="190" y="72" width="8" height="88"/>
    <rect x="198" y="62" width="8" height="98"/>
    <rect x="206" y="76" width="8" height="84"/>
    
