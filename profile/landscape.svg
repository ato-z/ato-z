<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes shoot {
      0% { transform: translateX(0) translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(200px) translateY(100px); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes aurora {
      0%, 100% { transform: translateX(0) scaleY(1); opacity: 0.3; }
      50% { transform: translateX(20px) scaleY(1.2); opacity: 0.5; }
    }
    
    .star { animation: twinkle 2s ease-in-out infinite; }
    .star:nth-child(1) { animation-delay: 0s; }
    .star:nth-child(2) { animation-delay: 0.3s; }
    .star:nth-child(3) { animation-delay: 0.6s; }
    .star:nth-child(4) { animation-delay: 0.9s; }
    .star:nth-child(5) { animation-delay: 1.2s; }
    .star:nth-child(6) { animation-delay: 1.5s; }
    .star:nth-child(7) { animation-delay: 1.8s; }
    .star:nth-child(8) { animation-delay: 0.15s; }
    .star:nth-child(9) { animation-delay: 0.45s; }
    .star:nth-child(10) { animation-delay: 0.75s; }
    
    .shooting { animation: shoot 8s ease-in-out infinite; }
    
    .mountain-back { animation: float 6s ease-in-out infinite; }
    .mountain-mid { animation: float 5s ease-in-out infinite 0.5s; }
    .mountain-front { animation: float 4s ease-in-out infinite 1s; }
    
    .city-glow { animation: glow 3s ease-in-out infinite; }
    
    .aurora { animation: aurora 8s ease-in-out infinite; }
  </style>
  
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#2a1a4a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff8e7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8888ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>
  
  <!-- Stars -->
  <g fill="#fff8e7">
    <rect class="star" x="20" y="15" width="2" height="2"/>
    <rect class="star" x="50" y="30" width="3" height="3"/>
    <rect class="star" x="90" y="10" width="2" height="2"/>
    <rect class="star" x="120" y="25" width="2" height="2"/>
    <rect class="star" x="160" y="8" width="3" height="3"/>
    <rect class="star" x="200" y="20" width="2" height="2"/>
    <rect class="star" x="240" y="12" width="2" height="2"/>
    <rect class="star" x="280" y="28" width="3" height="3"/>
    <rect class="star" x="320" y="5" width="2" height="2"/>
    <rect class="star" x="360" y="18" width="2" height="2"/>
    <rect class="star" x="380" y="35" width="3" height="3"/>
    <rect class="star" x="35" y="45" width="2" height="2"/>
    <rect class="star" x="75" y="50" width="2" height="2"/>
    <rect class="star" x="150" y="40" width="3" height="3"/>
    <rect class="star" x="220" y="35" width="2" height="2"/>
    <rect class="star" x="300" y="45" width="2" height="2"/>
    <rect class="star" x="350" y="30" width="2" height="2"/>
    <rect class="star" x="10" y="60" width="2" height="2"/>
    <rect class="star" x="130" y="55" width="2" height="2"/>
    <rect class="star" x="260" y="50" width="3" height="3"/>
    <rect class="star" x="340" y="55" width="2" height="2"/>
    <rect class="star" x="390" y="45" width="2" height="2"/>
  </g>
  
  <!-- Moon -->
  <circle cx="340" cy="50" r="25" fill="url(#moonGlow)"/>
  <circle cx="340" cy="50" r="18" fill="#fff8e7"/>
  <circle cx="335" cy="45" r="4" fill="#e8e0d0"/>
  <circle cx="345" cy="52" r="3" fill="#e8e0d0"/>
  <circle cx="338" cy="55" r="2" fill="#e8e0d0"/>
  
  <!-- Aurora -->
  <g class="aurora">
    <ellipse cx="200" cy="80" rx="180" ry="30" fill="url(#auroraGrad)"/>
  </g>
  
  <!-- Shooting star -->
  <g class="shooting" style="animation-delay: 2s;">
    <rect x="50" y="30" width="20" height="2" fill="#fff8e7" transform="rotate(-30, 50, 30)"/>
  </g>
  <g class="shooting" style="animation-delay: 6s;">
    <rect x="100" y="20" width="15" height="2" fill="#c9a227" transform="rotate(-25, 100, 20)"/>
  </g>
  
  <!-- Back mountains (purple) -->
  <g class="mountain-back" fill="#3a2a5a">
    <polygon points="0,200 50,100 100,200"/>
    <polygon points="60,200 130,80 200,200"/>
    <polygon points="150,200 250,70 350,200"/>
    <polygon points="280,200 360,90 400,200"/>
  </g>
  
  <!-- City silhouette back -->
  <g fill="#2a2a4a" class="city-glow">
    <rect x="80" y="140" width="15" height="60"/>
    <rect x="100" y="130" width="12" height="70"/>
    <rect x="118" y="135" width="18" height="65"/>
    <rect x="145" y="125" width="10" height="75"/>
    <rect x="162" y="140" width="14" height="60"/>
    <rect x="185" y="120" width="20" height="80"/>
    <rect x="215" y="135" width="12" height="65"/>
    <rect x="235" y="130" width="16" height="70"/>
    <rect x="260" y="140" width="14" height="60"/>
    <rect x="282" y="125" width="18" height="75"/>
    <rect x="308" y="135" width="12" height="65"/>
    <rect x="328" y="145" width="15" height="55"/>
  </g>
  
  <!-- City windows (lit) -->
  <g fill="#c9a227" opacity="0.8">
    <rect x="84" y="145" width="3" height="4"/>
    <rect x="90" y="150" width="3" height="4"/>
    <rect x="104" y="135" width="3" height="4"/>
    <rect x="110" y="145" width="3" height="4"/>
    <rect x="122" y="140" width="4" height="4"/>
    <rect x="130" y="150" width="4" height="4"/>
    <rect x="148" y="130" width="3" height="4"/>
    <rect x="165" y="145" width="3" height="4"/>
    <rect x="172" y="140" width="4" height="4"/>
    <rect x="190" y="125" width="4" height="4"/>
    <rect x="200" y="135" width="4" height="4"/>
    <rect x="218" y="140" width="3" height="4"/>
    <rect x="240" y="135" width="4" height="4"/>
    <rect x="250" y="145" width="3" height="4"/>
    <rect x="265" y="145" width="4" height="4"/>
    <rect x="285" y="130" width="4" height="4"/>
    <rect x="295" y="140" width="4" height="4"/>
    <rect x="312" y="140" width="3" height="4"/>
    <rect x="332" y="150" width="4" height="4"/>
  </g>
  
  <!-- Mid mountains (darker) -->
  <g class="mountain-mid" fill="#1a1a3a">
    <polygon points="0,200 80,120 160,200"/>
    <polygon points="100,200 200,90 300,200"/>
    <polygon points="250,200 330,110 400,200"/>
  </g>
  
  <!-- Front mountains (darkest) -->
  <g class="mountain-front" fill="#0a0a1a">
    <polygon points="0,200 60,150 120,200"/>
    <polygon points="80,200 180,130 280,200"/>
    <polygon points="200,200 300,140 400,200"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="190" width="400" height="10" fill="#0a0a1a"/>
  
  <!-- Ground detail -->
  <rect x="0" y="188" width="400" height="2" fill="#1a1a3a"/>
</svg>
