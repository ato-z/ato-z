  </g>
  
  <!-- Mushrooms -->
  <g>
    <!-- Red mushroom with white spots -->
    <rect x="60" y="148" width="2" height="4" fill="#e8dcc8"/>
    <rect x="58" y="146" width="6" height="2" fill="#c41e3a"/>
    <rect x="58" y="146" width="2" height="2" fill="#ffffff"/>
    <rect x="62" y="146" width="2" height="2" fill="#ffffff"/>
    
    <!-- Small brown mushroom -->
    <rect x="180" y="149" width="2" height="3" fill="#c4a882"/>
    <rect x="178" y="148" width="6" height="2" fill="#6b4423"/>
    
    <!-- Tiny mushroom -->
    <rect x="265" y="150" width="1" height="2" fill="#e8dcc8"/>
    <rect x="264" y="149" width="3" height="1" fill="#8b5a2b"/>
  </g>
  
  <!-- Fireflies -->
  <g class="firefly ff1">
    <rect x="45" y="100" width="2" height="2" fill="#ffff88"/>
  </g>
  <g class="firefly ff2">
    <rect x="120" y="95" width="2" height="2" fill="#88ff88"/>
  </g>
  <g class="firefly ff3">
    <rect x="200" y="105" width="2" height="2" fill="#ffff88"/>
  </g>
  <g class="firefly ff4">
    <rect x="160" y="90" width="2" height="2" fill="#88ffff"/>
  </g>
  <g class="firefly ff5">
    <rect x="280" y="98" width="2" height="2" fill="#ffff88"/>
  </g>
  
  <!-- Falling leaves -->
  <g class="leaf" fill="#8b5e3c" opacity="0.7">
    <rect x="80" y="120" width="3" height="2"/>
  </g>
  <g class="leaf" fill="#c4a060" opacity="0.6" style="animation-delay: 1s;">
    <rect x="180" y="115" width="3" height="2"/>
  </g>
  <g class="leaf" fill="#7a9f5a" opacity="0.7" style="animation-delay: 2s;">
    <rect x="250" y="118" width="3" height="2"/>
  </g>
</svg>