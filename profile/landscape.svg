    <rect x="225" y="94" width="8" height="66"/>
    <rect x="233" y="84" width="8" height="76"/>
    <rect x="241" y="100" width="8" height="60"/>
    
    <rect x="270" y="90" width="8" height="70"/>
    <rect x="278" y="80" width="8" height="80"/>
