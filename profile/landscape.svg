    <rect x="248" y="70" width="8" height="90"/>
    <rect x="256" y="84" width="8" height="76"/>
    
    <rect x="285" y="75" width="8" height="85"/>
    <rect x="293" y="65" width="8" height="95"/>
  </g>
  
  <!-- Near trees (layer 3) -->
