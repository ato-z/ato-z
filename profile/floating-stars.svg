<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }
    @keyframes drift {
      0% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-5px) translateX(3px); }
      50% { transform: translateY(-2px) translateX(6px); }
      75% { transform: translateY(-7px) translateX(3px); }
      100% { transform: translateY(0) translateX(0); }
    }
    .star { animation: twinkle 2s ease-in-out infinite; }
    .star:nth-child(2) { animation-delay: 0.3s; }
    .star:nth-child(3) { animation-delay: 0.6s; }
    .star:nth-child(4) { animation-delay: 0.9s; }
    .star:nth-child(5) { animation-delay: 1.2s; }
    .drift { animation: drift 4s ease-in-out infinite; }
    .drift:nth-child(6) { animation-delay: 0.5s; }
    .drift:nth-child(7) { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0f0f1a"/>
  
  <!-- Large star -->
  <polygon class="star" points="50,15 53,25 63,25 55,32 58,42 50,36 42,42 45,32 37,25 47,25" fill="#c9a227"/>
  
  <!-- Medium stars -->
  <polygon class="star" style="animation-delay: 0.4s" points="20,20 22,25 27,25 23,28 24,33 20,30 16,33 17,28 13,25 18,25" fill="#d4a574"/>
  <polygon class="star" style="animation-delay: 0.8s" points="80,25 82,30 87,30 83,33 84,38 80,35 76,38 77,33 73,30 78,30" fill="#d4a574"/>
  <polygon class="star" style="animation-delay: 1.2s" points="30,60 32,65 37,65 33,68 34,73 30,70 26,73 27,68 23,65 28,65" fill="#f0e6d3"/>
  <polygon class="star" style="animation-delay: 1.6s" points="70,70 72,75 77,75 73,78 74,83 70,80 66,83 67,78 63,75 68,75" fill="#f0e6d3"/>
  
  <!-- Small drifting particles -->
  <rect class="drift" x="15" y="45" width="4" height="4" fill="#f0e6d3"/>
  <rect class="drift" x="85" y="50" width="3" height="3" fill="#c9a227"/>
  <rect class="drift" x="45" y="80" width="3" height="3" fill="#d4a574"/>
  
  <!-- Corner decorations -->
  <rect x="0" y="0" width="8" height="8" fill="#c9a227"/>
  <rect x="92" y="0" width="8" height="8" fill="#c9a227"/>
  <rect x="0" y="92" width="8" height="8" fill="#c9a227"/>
  <rect x="92" y="92" width="8" height="8" fill="#c9a227"/>
</svg>
