<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="128" height="160">
  <style>
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes sword {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-15deg); }
    }
    @keyframes shield {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-2px); }
    }
    .knight { animation: bob 1.2s ease-in-out infinite; }
    .sword { animation: sword 1.5s ease-in-out infinite; transform-origin: 28px 44px; }
    .shield { animation: shield 1.5s ease-in-out infinite; }
  </style>
  
  <g class="knight">
    <!-- Helmet -->
    <rect x="24" y="4" width="16" height="4" fill="#c9a227"/>
    <rect x="22" y="8" width="20" height="4" fill="#d4a574"/>
    <rect x="22" y="12" width="20" height="8" fill="#d4a574"/>
    <rect x="26" y="14" width="12" height="4" fill="#1a1a2e"/>
    <!-- Visor slit -->
    <rect x="26" y="16" width="12" height="2" fill="#0f0f1a"/>
    <rect x="22" y="20" width="20" height="2" fill="#d4a574"/>
    
    <!-- Body Armor -->
    <rect x="20" y="24" width="24" height="16" fill="#c9a227"/>
    <rect x="24" y="28" width="16" height="8" fill="#d4a574"/>
    <rect x="28" y="30" width="8" height="4" fill="#c9a227"/>
    
    <!-- Arms -->
    <rect x="14" y="26" width="6" height="12" fill="#d4a574"/>
    <rect x="44" y="26" width="6" height="12" fill="#d4a574"/>
    
    <!-- Shield (left) -->
    <g class="shield">
      <rect x="8" y="28" width="8" height="14" fill="#c9a227"/>
      <rect x="10" y="30" width="4" height="10" fill="#0f0f1a"/>
    </g>
    
    <!-- Sword (right) -->
    <g class="sword">
      <rect x="48" y="20" width="4" height="28" fill="#f0e6d3"/>
      <rect x="46" y="44" width="8" height="4" fill="#c9a227"/>
      <rect x="48" y="16" width="4" height="6" fill="#f0e6d3"/>
    </g>
    
    <!-- Legs -->
    <rect x="22" y="42" width="8" height="14" fill="#8b7355"/>
    <rect x="34" y="42" width="8" height="14" fill="#8b7355"/>
    <rect x="20" y="56" width="10" height="4" fill="#5c4033"/>
    <rect x="34" y="56" width="10" height="4" fill="#5c4033"/>
    
    <!-- Feet -->
    <rect x="18" y="60" width="12" height="4" fill="#3d2914"/>
    <rect x="34" y="60" width="12" height="4" fill="#3d2914"/>
  </g>
</svg>
