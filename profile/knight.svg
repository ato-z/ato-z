<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" width="160" height="220">
  <style>
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes eyeGlow {
      0%, 100% { fill: #c9a227; filter: drop-shadow(0 0 2px #c9a227); }
      50% { fill: #f0e6d3; filter: drop-shadow(0 0 6px #f0e6d3); }
    }
    @keyframes gemPulse {
      0%, 100% { fill: #c9a227; }
      50% { fill: #f0e6d3; }
    }
    @keyframes capeSway {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(3deg); }
    }
    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) translateX(0) scale(0.3); }
      25% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-50px) translateX(20px) scale(0.8); }
    }
    @keyframes particleSparkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    @keyframes shieldShift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-2px); }
    }
    @keyframes swordFloat {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(-3deg) translateY(-2px); }
    }
    @keyframes ambientGlow {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.12; }
    }
    
    .knight { animation: idle 2s ease-in-out infinite; }
    .eye { animation: eyeGlow 2.5s ease-in-out infinite; }
    .gem { animation: gemPulse 3s ease-in-out infinite; }
    .cape { animation: capeSway 2.5s ease-in-out infinite; transform-origin: 40px 28px; }
    .shield { animation: shieldShift 3s ease-in-out infinite; }
    .sword { animation: swordFloat 3s ease-in-out infinite; transform-origin: 48px 36px; }
    .ambient { animation: ambientGlow 4s ease-in-out infinite; }
    
    /* Particles */
    .p1 { animation: particleFloat 4s ease-out infinite; }
    .p2 { animation: particleFloat 4s ease-out infinite 1s; }
    .p3 { animation: particleFloat 4s ease-out infinite 2s; }
    .p4 { animation: particleFloat 4s ease-out infinite 0.5s; }
    .p5 { animation: particleFloat 4s ease-out infinite 1.5s; }
    .p6 { animation: particleFloat 4s ease-out infinite 2.5s; }
    .p7 { animation: particleSparkle 2s ease-in-out infinite; }
    .p8 { animation: particleSparkle 2s ease-in-out infinite 0.7s; }
    .p9 { animation: particleSparkle 2s ease-in-out infinite 1.4s; }
  </style>
  
  <!-- Ambient glow behind knight -->
  <ellipse cx="40" cy="60" rx="38" ry="55" fill="#c9a227" class="ambient"/>
  
  <!-- Floating particles - gold -->
  <rect class="p1" x="10" y="85" width="3" height="3" fill="#c9a227" rx="1"/>
  <rect class="p4" x="65" y="80" width="4" height="4" fill="#c9a227" rx="1"/>
  <rect class="p7" x="25" y="70" width="2" height="2" fill="#c9a227"/>
  <rect class="p8" x="55" y="65" width="3" height="3" fill="#c9a227"/>
  
  <!-- Floating particles - white/cream -->
  <rect class="p2" x="18" y="90" width="2" height="2" fill="#f0e6d3" rx="1"/>
  <rect class="p5" x="60" y="88" width="3" height="3" fill="#f0e6d3" rx="1"/>
  <rect class="p9" x="40" y="75" width="2" height="2" fill="#f0e6d3"/>
  
  <!-- Floating particles - accent -->
  <rect class="p3" x="35" y="95" width="2" height="2" fill="#d4a574" rx="1"/>
  <rect class="p6" x="50" y="92" width="2" height="2" fill="#d4a574" rx="1"/>
  
  <g class="knight">
    <!-- Cape -->
    <g class="cape">
      <rect x="24" y="26" width="8" height="30" fill="#8b1a1a"/>
      <rect x="22" y="28" width="4" height="26" fill="#6b1414"/>
      <rect x="48" y="26" width="8" height="30" fill="#8b1a1a"/>
      <rect x="54" y="28" width="4" height="26" fill="#6b1414"/>
    </g>
    
    <!-- Helmet -->
    <rect x="26" y="2" width="28" height="6" fill="#c9a227"/>
    <rect x="22" y="6" width="36" height="8" fill="#d4a574"/>
    <rect x="22" y="12" width="36" height="12" fill="#d4a574"/>
    
    <!-- Eyes -->
    <rect x="26" y="16" width="10" height="4" fill="#1a1a2e"/>
    <rect x="44" y="16" width="10" height="4" fill="#1a1a2e"/>
    <rect class="eye" x="27" y="17" width="8" height="2" fill="#c9a227"/>
    <rect class="eye" x="45" y="17" width="8" height="2" fill="#c9a227"/>
    
    <rect x="22" y="22" width="36" height="4" fill="#d4a574"/>
    <rect x="18" y="6" width="6" height="22" fill="#d4a574"/>
    <rect x="56" y="6" width="6" height="22" fill="#d4a574"/>
    
    <!-- Helmet gem -->
    <rect class="gem" x="38" y="4" width="4" height="4" fill="#c9a227"/>
    
    <!-- Shoulder armor -->
    <rect x="10" y="24" width="14" height="8" fill="#c9a227"/>
    <rect x="56" y="24" width="14" height="8" fill="#c9a227"/>
    <rect x="12" y="26" width="10" height="6" fill="#d4a574"/>
    <rect x="58" y="26" width="10" height="6" fill="#d4a574"/>
    
    <!-- Body -->
    <rect x="20" y="28" width="40" height="24" fill="#c9a227"/>
    <rect x="26" y="34" width="28" height="14" fill="#d4a574"/>
    
    <!-- Chest gem -->
    <rect class="gem" x="36" y="36" width="8" height="8" fill="#c9a227"/>
    <rect x="38" y="38" width="4" height="4" fill="#f0e6d3"/>
    
    <!-- Belt -->
    <rect x="20" y="50" width="40" height="6" fill="#8b7355"/>
    <rect x="36" y="49" width="8" height="8" fill="#c9a227"/>
    
    <!-- Arms -->
    <rect x="12" y="30" width="10" height="20" fill="#d4a574"/>
    <rect x="58" y="30" width="10" height="20" fill="#d4a574"/>
    
    <!-- Gauntlets -->
    <rect x="10" y="48" width="12" height="8" fill="#c9a227"/>
    <rect x="58" y="48" width="12" height="8" fill="#c9a227"/>
    
    <!-- Shield -->
    <g class="shield">
      <rect x="4" y="30" width="14" height="24" fill="#c9a227"/>
      <rect x="6" y="32" width="10" height="20" fill="#d4a574"/>
      <rect x="8" y="34" width="6" height="16" fill="#8b1a1a"/>
      <rect x="10" y="36" width="2" height="12" fill="#f0e6d3"/>
    </g>
    
    <!-- Sword -->
    <g class="sword">
      <rect x="56" y="10" width="5" height="30" fill="#f0e6d3"/>
      <polygon points="58.5,10 55,2 62,2" fill="#f0e6d3"/>
      <rect x="52" y="38" width="13" height="5" fill="#c9a227"/>
      <rect x="58" y="43" width="4" height="10" fill="#5c4033"/>
      <rect x="55" y="53" width="10" height="5" fill="#c9a227"/>
    </g>
    
    <!-- Legs -->
    <rect x="22" y="54" width="14" height="22" fill="#8b7355"/>
    <rect x="44" y="54" width="14" height="22" fill="#8b7355"/>
    
    <!-- Knee guards -->
    <rect x="22" y="60" width="14" height="6" fill="#c9a227"/>
    <rect x="44" y="60" width="14" height="6" fill="#c9a227"/>
    
    <!-- Boots -->
    <rect x="20" y="76" width="18" height="10" fill="#3d2914"/>
    <rect x="42" y="76" width="18" height="10" fill="#3d2914"/>
    <rect x="16" y="84" width="22" height="6" fill="#2a1a0a"/>
    <rect x="42" y="84" width="22" height="6" fill="#2a1a0a"/>
  </g>
</svg>
