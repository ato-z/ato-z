<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <style>
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes eyeGlow {
      0%, 100% { fill: #c9a227; }
      50% { fill: #fff8e7; }
    }
    @keyframes gemPulse {
      0%, 100% { fill: #c9a227; }
      50% { fill: #fff8e7; }
    }
    @keyframes capeSway {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(4deg); }
    }
    @keyframes shieldMove {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-3px); }
    }
    @keyframes swordSwing {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-5deg); }
    }
  </style>
  
  <g>
    <ellipse cx="60" cy="90" rx="45" ry="65" fill="#c9a227" opacity="0.1"/>
  </g>
  
  <!-- Particles as separate animated elements -->
  <circle cx="20" cy="140" r="3" fill="#c9a227">
    <animate attributeName="cy" values="140;80;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="20;35;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="100" cy="150" r="4" fill="#fff8e7">
    <animate attributeName="cy" values="150;90;30" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;85;70" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="60" cy="155" r="3" fill="#c9a227">
    <animate attributeName="cy" values="155;95;35" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="35" cy="145" r="2" fill="#d4a574">
    <animate attributeName="cy" values="145;85;25" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="85" cy="148" r="3" fill="#c9a227">
    <animate attributeName="cy" values="148;88;28" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <g class="knight" style="animation: idle 2s ease-in-out infinite;">
    <!-- Cape -->
    <g style="animation: capeSway 2.5s ease-in-out infinite; transform-origin: 60px 40px;">
      <rect x="38" y="38" width="10" height="40" fill="#8b1a1a"/>
      <rect x="72" y="38" width="10" height="40" fill="#8b1a1a"/>
      <rect x="35" y="40" width="5" height="35" fill="#6b1414"/>
      <rect x="80" y="40" width="5" height="35" fill="#6b1414"/>
    </g>
    
    <!-- Helmet -->
    <rect x="40" y="5" width="40" height="8" fill="#c9a227"/>
    <rect x="34" y="11" width="52" height="10" fill="#d4a574"/>
    <rect x="34" y="19" width="52" height="14" fill="#d4a574"/>
    
    <!-- Eyes -->
    <rect x="38" y="23" width="16" height="5" fill="#1a1a2e"/>
    <rect x="66" y="23" width="16" height="5" fill="#1a1a2e"/>
    <rect x="40" y="24" width="12" height="3" fill="#c9a227" style="animation: eyeGlow 2s ease-in-out infinite;"/>
    <rect x="68" y="24" width="12" height="3" fill="#c9a227" style="animation: eyeGlow 2s ease-in-out infinite;"/>
    
    <rect x="34" y="31" width="52" height="5" fill="#d4a574"/>
    <rect x="28" y="11" width="8" height="28" fill="#d4a574"/>
    <rect x="84" y="11" width="8" height="28" fill="#d4a574"/>
    
    <!-- Helmet gem -->
    <rect x="56" y="7" width="8" height="5" fill="#c9a227" style="animation: gemPulse 2.5s ease-in-out infinite;"/>
    
    <!-- Shoulders -->
    <rect x="14" y="35" width="22" height="10" fill="#c9a227"/>
    <rect x="84" y="35" width="22" height="10" fill="#c9a227"/>
    <rect x="16" y="37" width="18" height="8" fill="#d4a574"/>
    <rect x="86" y="37" width="18" height="8" fill="#d4a574"/>
    
    <!-- Body -->
    <rect x="30" y="40" width="60" height="32" fill="#c9a227"/>
    <rect x="38" y="48" width="44" height="18" fill="#d4a574"/>
    
    <!-- Chest gem -->
    <rect x="54" y="50" width="12" height="12" fill="#c9a227" style="animation: gemPulse 3s ease-in-out infinite;"/>
    <rect x="57" y="53" width="6" height="6" fill="#fff8e7"/>
    
    <!-- Belt -->
    <rect x="30" y="70" width="60" height="8" fill="#8b7355"/>
    <rect x="54" y="69" width="12" height="10" fill="#c9a227"/>
    
    <!-- Arms -->
    <rect x="16" y="43" width="16" height="28" fill="#d4a574"/>
    <rect x="88" y="43" width="16" height="28" fill="#d4a574"/>
    
    <!-- Gauntlets -->
    <rect x="14" y="68" width="18" height="10" fill="#c9a227"/>
    <rect x="88" y="68" width="18" height="10" fill="#c9a227"/>
    
    <!-- Shield -->
    <g style="animation: shieldMove 3s ease-in-out infinite;">
      <rect x="6" y="42" width="18" height="32" fill="#c9a227"/>
      <rect x="8" y="44" width="14" height="28" fill="#d4a574"/>
      <rect x="10" y="46" width="10" height="22" fill="#8b1a1a"/>
      <rect x="14" y="48" width="3" height="18" fill="#fff8e7"/>
    </g>
    
    <!-- Sword -->
    <g style="animation: swordSwing 3s ease-in-out infinite; transform-origin: 96px 50px;">
      <rect x="94" y="15" width="8" height="40" fill="#fff8e7"/>
      <polygon points="98,15 92,5 104,5" fill="#fff8e7"/>
      <rect x="88" y="53" width="20" height="6" fill="#c9a227"/>
      <rect x="96" y="59" width="6" height="14" fill="#5c4033"/>
      <rect x="90" y="73" width="18" height="6" fill="#c9a227"/>
    </g>
    
    <!-- Legs -->
    <rect x="34" y="76" width="20" height="30" fill="#8b7355"/>
    <rect x="66" y="76" width="20" height="30" fill="#8b7355"/>
    
    <!-- Knees -->
    <rect x="34" y="86" width="20" height="8" fill="#c9a227"/>
    <rect x="66" y="86" width="20" height="8" fill="#c9a227"/>
    
    <!-- Boots -->
    <rect x="30" y="106" width="26" height="14" fill="#3d2914"/>
    <rect x="64" y="106" width="26" height="14" fill="#3d2914"/>
    <rect x="24" y="118" width="32" height="8" fill="#2a1a0a"/>
    <rect x="64" y="118" width="32" height="8" fill="#2a1a0a"/>
  </g>
</svg>
