<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 24" width="600" height="24">
  <style>
    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-60px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.3; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; r: 3; }
      50% { opacity: 0.6; r: 2; }
    }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 1; }
      100% { transform: translateY(-10px) translateX(5px); opacity: 0; }
    }
    .scroll-line { animation: scrollLeft 3s linear infinite; }
    .blink { animation: blink 1.5s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .particle { animation: floatUp 2s ease-out infinite; }
    .particle:nth-child(2) { animation-delay: 0.5s; }
    .particle:nth-child(3) { animation-delay: 1s; }
    .particle:nth-child(4) { animation-delay: 1.5s; }
  </style>
  
  <!-- Top line -->
  <rect x="0" y="4" width="600" height="2" fill="#c9a227"/>
  <rect x="0" y="10" width="600" height="4" fill="#c9a227"/>
  <rect x="0" y="18" width="600" height="2" fill="#c9a227"/>
  
  <!-- Corner gems -->
  <polygon points="0,12 4,8 8,12 4,16" fill="#d4a574" class="pulse"/>
  <polygon points="592,12 596,8 600,12 596,16" fill="#d4a574" class="pulse" style="animation-delay: 0.5s"/>
  
  <!-- Scrolling dot pattern -->
  <g class="scroll-line">
    <circle cx="20" cy="12" r="2" fill="#f0e6d3" class="pulse"/>
    <circle cx="40" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.2s"/>
    <circle cx="60" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.4s"/>
    <circle cx="80" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.6s"/>
    <circle cx="100" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.8s"/>
    <circle cx="120" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1s"/>
    <circle cx="140" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.2s"/>
    <circle cx="160" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.4s"/>
    <circle cx="180" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.6s"/>
    <circle cx="200" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.8s"/>
    <circle cx="220" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2s"/>
    <circle cx="240" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.2s"/>
    <circle cx="260" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.4s"/>
    <circle cx="280" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.6s"/>
    <circle cx="300" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.8s"/>
    <circle cx="320" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.1s"/>
    <circle cx="340" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.3s"/>
    <circle cx="360" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.5s"/>
    <circle cx="380" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.7s"/>
    <circle cx="400" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 0.9s"/>
    <circle cx="420" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.1s"/>
    <circle cx="440" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.3s"/>
    <circle cx="460" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.5s"/>
    <circle cx="480" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.7s"/>
    <circle cx="500" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 1.9s"/>
    <circle cx="520" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.1s"/>
    <circle cx="540" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.3s"/>
    <circle cx="560" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.5s"/>
    <circle cx="580" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.7s"/>
    <circle cx="600" cy="12" r="2" fill="#f0e6d3" class="pulse" style="animation-delay: 2.9s"/>
  </g>
  
  <!-- Floating particles -->
  <g class="particle">
    <rect x="150" y="20" width="3" height="3" fill="#f0e6d3"/>
  </g>
  <g class="particle">
    <rect x="300" y="22" width="2" height="2" fill="#d4a574"/>
  </g>
  <g class="particle">
    <rect x="450" y="20" width="3" height="3" fill="#f0e6d3"/>
  </g>
  <g class="particle">
    <rect x="550" y="22" width="2" height="2" fill="#d4a574"/>
  </g>
  
  <!-- Star decorations -->
  <g class="blink" style="animation-delay: 0s">
    <polygon points="50,12 52,8 54,12 58,12 55,14 56,18 52,16 48,18 49,14 46,12" fill="#f0e6d3"/>
  </g>
  <g class="blink" style="animation-delay: 0.5s">
    <polygon points="250,12 252,8 254,12 258,12 255,14 256,18 252,16 248,18 249,14 246,12" fill="#f0e6d3"/>
  </g>
  <g class="blink" style="animation-delay: 1s">
    <polygon points="450,12 452,8 454,12 458,12 455,14 456,18 452,16 448,18 449,14 446,12" fill="#f0e6d3"/>
  </g>
  <g class="blink" style="animation-delay: 1.5s">
    <polygon points="550,12 552,8 554,12 558,12 555,14 556,18 552,16 548,18 549,14 546,12" fill="#f0e6d3"/>
  </g>
</svg>
