<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 96" width="128" height="192">
  <style>
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes swordSwing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }
    @keyframes shieldBounce {
      0%, 100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(-1px) translateY(-2px); }
    }
    @keyframes visorGlow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes capeWave {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(3deg); }
    }
    .knight { animation: idle 1.2s ease-in-out infinite; }
    .sword { animation: swordSwing 2s ease-in-out infinite; transform-origin: 44px 38px; }
    .shield { animation: shieldBounce 1.5s ease-in-out infinite; }
    .visor { animation: visorGlow 2s ease-in-out infinite; }
    .cape { animation: capeWave 1.8s ease-in-out infinite; transform-origin: 32px 24px; }
  </style>
  
  <g class="knight">
    <!-- Cape -->
    <g class="cape">
      <rect x="20" y="22" width="6" height="20" fill="#8b1a1a"/>
      <rect x="18" y="24" width="4" height="16" fill="#6b1414"/>
    </g>
    
    <!-- Helmet -->
    <rect x="22" y="2" width="20" height="6" fill="#c9a227"/> <!-- Helm top -->
    <rect x="20" y="6" width="24" height="6" fill="#d4a574"/> <!-- Helm upper -->
    <rect x="20" y="10" width="24" height="10" fill="#d4a574"/> <!-- Helm face -->
    
    <!-- Visor (glowing eyes) -->
    <rect x="22" y="14" width="8" height="3" fill="#1a1a2e" class="visor"/>
    <rect x="34" y="14" width="8" height="3" fill="#1a1a2e" class="visor"/>
    <rect x="23" y="15" width="6" height="1" fill="#c9a227" class="visor"/>
    <rect x="35" y="15" width="6" height="1" fill="#c9a227" class="visor"/>
    
    <rect x="20" y="18" width="24" height="3" fill="#d4a574"/> <!-- Helm bottom -->
    <rect x="18" y="6" width="4" height="16" fill="#d4a574"/> <!-- Left cheek -->
    <rect x="42" y="6" width="4" height="16" fill="#d4a574"/> <!-- Right cheek -->
    
    <!-- Shoulder plates -->
    <rect x="12" y="22" width="10" height="6" fill="#c9a227"/>
    <rect x="42" y="22" width="10" height="6" fill="#c9a227"/>
    <rect x="14" y="24" width="6" height="4" fill="#d4a574"/>
    <rect x="44" y="24" width="6" height="4" fill="#d4a574"/>
    
    <!-- Body armor -->
    <rect x="18" y="26" width="28" height="18" fill="#c9a227"/>
    <rect x="22" y="30" width="20" height="10" fill="#d4a574"/>
    <rect x="28" y="32" width="8" height="6" fill="#c9a227"/> <!-- Chest gem -->
    <rect x="30" y="33" width="4" height="4" fill="#f0e6d3"/> <!-- Chest gem center -->
    
    <!-- Belt -->
    <rect x="18" y="42" width="28" height="4" fill="#8b7355"/>
    <rect x="30" y="41" width="4" height="6" fill="#c9a227"/>
    
    <!-- Shield (left) -->
    <g class="shield">
      <rect x="6" y="28" width="12" height="18" fill="#c9a227"/>
      <rect x="8" y="30" width="8" height="14" fill="#d4a574"/>
      <rect x="10" y="32" width="4" height="10" fill="#8b1a1a"/>
      <rect x="12" y="34" width="2" height="6" fill="#f0e6d3"/>
    </g>
    
    <!-- Sword (right) -->
    <g class="sword">
      <!-- Blade -->
      <rect x="48" y="14" width="4" height="24" fill="#f0e6d3"/>
      <polygon points="50,14 46,8 54,8" fill="#f0e6d3"/>
      <!-- Guard -->
      <rect x="44" y="36" width="12" height="4" fill="#c9a227"/>
      <!-- Handle -->
      <rect x="48" y="40" width="4" height="8" fill="#5c4033"/>
      <!-- Pommel -->
      <rect x="46" y="48" width="8" height="4" fill="#c9a227"/>
    </g>
    
    <!-- Arms -->
    <rect x="14" y="28" width="6" height="14" fill="#d4a574"/>
    <rect x="44" y="28" width="6" height="14" fill="#d4a574"/>
    
    <!-- Legs -->
    <rect x="20" y="46" width="10" height="16" fill="#8b7355"/>
    <rect x="34" y="46" width="10" height="16" fill="#8b7355"/>
    
    <!-- Knee guards -->
    <rect x="20" y="50" width="10" height="4" fill="#c9a227"/>
    <rect x="34" y="50" width="10" height="4" fill="#c9a227"/>
    
    <!-- Boots -->
    <rect x="18" y="62" width="14" height="6" fill="#3d2914"/>
    <rect x="32" y="62" width="14" height="6" fill="#3d2914"/>
    <rect x="16" y="66" width="16" height="4" fill="#2a1a0a"/>
    <rect x="30" y="66" width="16" height="4" fill="#2a1a0a"/>
  </g>
</svg>
