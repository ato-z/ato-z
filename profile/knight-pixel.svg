<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="160" height="240">
  <style>
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes visorGlow {
      0%, 100% { fill: #f0e6d3; }
      50% { fill: #c9a227; }
    }
    @keyframes capeWave {
      0%, 100% { transform: skewX(0deg) translateX(0); }
      25% { transform: skewX(2deg) translateX(1px); }
      75% { transform: skewX(-2deg) translateX(-1px); }
    }
    @keyframes swordGlint {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-30px) translateX(10px); opacity: 0; }
    }
    @keyframes chestPulse {
      0%, 100% { fill: #c9a227; }
      50% { fill: #d4a574; }
    }
    .knight-body { animation: idle 1.5s ease-in-out infinite; }
    .visor-light { animation: visorGlow 2s ease-in-out infinite; }
    .cape { animation: capeWave 2s ease-in-out infinite; transform-origin: 40px 30px; }
    .sword-blade { animation: swordGlint 1.5s ease-in-out infinite; }
    .chest-gem { animation: chestPulse 3s ease-in-out infinite; }
    .particle { animation: floatParticle 3s ease-out infinite; }
    .particle:nth-child(2) { animation-delay: 0.7s; }
    .particle:nth-child(3) { animation-delay: 1.4s; }
    .particle:nth-child(4) { animation-delay: 2.1s; }
  </style>
  
  <!-- Background glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <filter id="pixelate">
      <feFlood x="4" y="4" height="2" width="2"/>
      <feComposite width="8" height="8"/>
      <feTile result="a"/>
      <feComposite in="SourceGraphic" in2="a" operator="in"/>
      <feMorphology operator="dilate" radius="4"/>
    </filter>
  </defs>
  
  <!-- Glow circle behind knight -->
  <ellipse cx="40" cy="60" rx="35" ry="50" fill="url(#glow)" class="knight-body"/>
  
  <!-- Floating particles -->
  <rect class="particle" x="20" y="90" width="3" height="3" fill="#f0e6d3"/>
  <rect class="particle" x="55" y="85" width="2" height="2" fill="#c9a227"/>
  <rect class="particle" x="35" y="95" width="2" height="2" fill="#d4a574"/>
  <rect class="particle" x="60" y="80" width="3" height="3" fill="#f0e6d3"/>
  
  <g class="knight-body">
    <!-- Cape -->
    <g class="cape">
      <rect x="24" y="28" width="8" height="28" fill="#8b1a1a"/>
      <rect x="22" y="30" width="4" height="24" fill="#6b1414"/>
      <rect x="48" y="28" width="8" height="28" fill="#8b1a1a"/>
      <rect x="54" y="30" width="4" height="24" fill="#6b1414"/>
    </g>
    
    <!-- Helmet -->
    <rect x="26" y="4" width="28" height="6" fill="#c9a227"/> <!-- Helm top -->
    <rect x="22" y="8" width="36" height="8" fill="#d4a574"/> <!-- Helm upper -->
    <rect x="22" y="14" width="36" height="12" fill="#d4a574"/> <!-- Helm face -->
    
    <!-- Visor (glowing eyes) -->
    <rect x="24" y="18" width="12" height="4" fill="#1a1a2e"/>
    <rect x="44" y="18" width="12" height="4" fill="#1a1a2e"/>
    <rect x="25" y="19" width="10" height="2" fill="#c9a227" class="visor-light"/>
    <rect x="45" y="19" width="10" height="2" fill="#c9a227" class="visor-light"/>
    
    <rect x="22" y="24" width="36" height="4" fill="#d4a574"/> <!-- Helm bottom -->
    <rect x="18" y="8" width="6" height="22" fill="#d4a574"/> <!-- Left cheek -->
    <rect x="56" y="8" width="6" height="22" fill="#d4a574"/> <!-- Right cheek -->
    
    <!-- Helmet gem -->
    <rect x="38" y="6" width="4" height="4" fill="#c9a227" class="chest-gem"/>
    
    <!-- Shoulder plates -->
    <rect x="10" y="26" width="14" height="8" fill="#c9a227"/>
    <rect x="56" y="26" width="14" height="8" fill="#c9a227"/>
    <rect x="12" y="28" width="10" height="6" fill="#d4a574"/>
    <rect x="58" y="28" width="10" height="6" fill="#d4a574"/>
    
    <!-- Body armor -->
    <rect x="20" y="30" width="40" height="22" fill="#c9a227"/>
    <rect x="26" y="36" width="28" height="12" fill="#d4a574"/>
    
    <!-- Chest gem (animated) -->
    <rect x="36" y="38" width="8" height="8" fill="#c9a227" class="chest-gem"/>
    <rect x="38" y="40" width="4" height="4" fill="#f0e6d3"/>
    
    <!-- Belt -->
    <rect x="20" y="50" width="40" height="6" fill="#8b7355"/>
    <rect x="36" y="49" width="8" height="8" fill="#c9a227"/>
    
    <!-- Arms -->
    <rect x="12" y="32" width="10" height="18" fill="#d4a574"/>
    <rect x="58" y="32" width="10" height="18" fill="#d4a574"/>
    
    <!-- Gauntlets -->
    <rect x="10" y="48" width="12" height="8" fill="#c9a227"/>
    <rect x="58" y="48" width="12" height="8" fill="#c9a227"/>
    
    <!-- Shield (left) -->
    <rect x="4" y="32" width="14" height="22" fill="#c9a227"/>
    <rect x="6" y="34" width="10" height="18" fill="#d4a574"/>
    <rect x="8" y="36" width="6" height="14" fill="#8b1a1a"/>
    <rect x="10" y="38" width="2" height="10" fill="#f0e6d3"/>
    
    <!-- Sword (right) -->
    <g transform="translate(60, 28)">
      <!-- Blade -->
      <rect x="0" y="0" width="6" height="32" fill="#f0e6d3" class="sword-blade"/>
      <!-- Blade tip -->
      <polygon points="3,0 0,8 6,8" fill="#f0e6d3" class="sword-blade"/>
      <!-- Guard -->
      <rect x="-4" y="30" width="14" height="6" fill="#c9a227"/>
      <!-- Handle -->
      <rect x="1" y="36" width="4" height="10" fill="#5c4033"/>
      <!-- Pommel -->
      <rect x="-1" y="46" width="8" height="6" fill="#c9a227"/>
    </g>
    
    <!-- Legs -->
    <rect x="22" y="54" width="14" height="20" fill="#8b7355"/>
    <rect x="44" y="54" width="14" height="20" fill="#8b7355"/>
    
    <!-- Knee guards -->
    <rect x="22" y="60" width="14" height="6" fill="#c9a227"/>
    <rect x="44" y="60" width="14" height="6" fill="#c9a227"/>
    
    <!-- Boots -->
    <rect x="20" y="74" width="18" height="10" fill="#3d2914"/>
    <rect x="42" y="74" width="18" height="10" fill="#3d2914"/>
    <rect x="16" y="82" width="22" height="6" fill="#2a1a0a"/>
    <rect x="42" y="82" width="22" height="6" fill="#2a1a0a"/>
  </g>
</svg>
